<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极兔油价成本追踪 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 5px;
        }

        header .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        /* 汇总卡片 */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card .label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        .card .value.positive {
            color: #4ade80;
        }

        .card .value.negative {
            color: #f87171;
        }

        /* 图表区域 */
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h2 {
            font-size: 1.2rem;
            color: #fff;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
        }

        /* 国家表格 */
        .countries-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }

        .countries-table h2 {
            margin-bottom: 15px;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #888;
            font-weight: 500;
            font-size: 0.85rem;
        }

        td {
            color: #e0e0e0;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .country-name {
            cursor: pointer;
            transition: color 0.2s;
        }

        .country-name:hover {
            color: #60a5fa;
        }

        .change-positive {
            color: #4ade80;
        }

        .change-negative {
            color: #f87171;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        /* 错误提示 */
        .error {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid #f87171;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #f87171;
        }

        /* 刷新按钮 */
        .refresh-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 极兔油价成本追踪</h1>
            <p class="subtitle">J&T Express Fuel Cost Tracker</p>
        </header>

        <!-- 汇总卡片 -->
        <div class="summary-cards" id="summaryCards">
            <div class="card">
                <div class="label">全球加权成本</div>
                <div class="value" id="weightedCost">--</div>
            </div>
            <div class="card">
                <div class="label">累计涨幅</div>
                <div class="value" id="cumulativeChange">--</div>
            </div>
            <div class="card">
                <div class="label">每单多付</div>
                <div class="value" id="extraPerOrder">--</div>
            </div>
            <div class="card">
                <div class="label">当日多付总额</div>
                <div class="value" id="dailyExtra">--</div>
            </div>
            <div class="card">
                <div class="label">累计多付总额</div>
                <div class="value" id="cumulativeExtra">--</div>
            </div>
        </div>

        <!-- 图表 -->
        <div class="chart-container">
            <div class="chart-header">
                <h2>柴油价格涨幅（Weekly 数据，相对 2026-02-23 基准）</h2>
                <button class="refresh-btn" onclick="loadData()">刷新数据</button>
            </div>
            <div class="chart-info" style="color: #888; font-size: 0.85rem; margin-bottom: 10px;">
                数据来源: GlobalPetrolPrices.com | 更新频率: 每周 (Weekly) | 基准日期: 2026-02-23
            </div>
            <div class="chart-wrapper">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <!-- 国家明细表 -->
        <div class="countries-table">
            <h2>各国明细</h2>
            <table>
                <thead>
                    <tr>
                        <th>国家</th>
                        <th>柴油价格 ($/L)</th>
                        <th>涨幅 (相对2/23)</th>
                        <th>每单成本 ($)</th>
                        <th>单量占比</th>
                    </tr>
                </thead>
                <tbody id="countriesTable">
                    <tr><td colspan="5" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let priceChart = null;

        // 颜色配置
        const countryColors = {
            'China': '#ef4444',
            'Vietnam': '#f97316',
            'Indonesia': '#eab308',
            'Thailand': '#22c55e',
            'Malaysia': '#14b8a6',
            'Philippines': '#06b6d4',
            'Mexico': '#3b82f6',
            'Brazil': '#8b5cf6',
            'South_Korea': '#ec4899',
            'USA': '#64748b'
        };

        // 加载数据
        async function loadData() {
            try {
                // 加载汇总数据
                const summaryRes = await fetch('/api/summary');
                const summaryData = await summaryRes.json();

                if (summaryData.success) {
                    updateSummaryCards(summaryData.data);
                    updateCountriesTable(summaryData.data.countries_detail);
                }

                // 加载价格趋势
                const pricesRes = await fetch('/api/prices?days=30');
                const pricesData = await pricesRes.json();

                if (pricesData.success) {
                    updateChart(pricesData.data);
                }

            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 更新汇总卡片
        function updateSummaryCards(data) {
            const formatMoney = (val) => val != null ? `$${val.toFixed(4)}` : '--';
            const formatPct = (val) => val != null ? `${val >= 0 ? '+' : ''}${val.toFixed(1)}%` : '--';
            const formatBigMoney = (val) => val != null ? `$${val.toLocaleString('en-US', {maximumFractionDigits: 0})}` : '--';

            document.getElementById('weightedCost').textContent = formatMoney(data.weighted_cost_per_order);

            const changeEl = document.getElementById('cumulativeChange');
            changeEl.textContent = formatPct(data.cumulative_change_pct);
            changeEl.className = `value ${data.cumulative_change_pct >= 0 ? 'positive' : 'negative'}`;

            document.getElementById('extraPerOrder').textContent = formatMoney(data.extra_per_order);
            document.getElementById('dailyExtra').textContent = formatBigMoney(data.daily_extra_total);
            document.getElementById('cumulativeExtra').textContent = formatBigMoney(data.cumulative_extra_total);
        }

        // 更新国家表格
        function updateCountriesTable(countries) {
            const tbody = document.getElementById('countriesTable');

            if (!countries || countries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">暂无数据，请先配置 jnt_params.yaml</td></tr>';
                return;
            }

            tbody.innerHTML = countries.map(c => {
                const changeClass = c.price_change_pct >= 0 ? 'change-positive' : 'change-negative';
                const changeSign = c.price_change_pct >= 0 ? '+' : '';
                const weight = c.daily_orders > 0 ? (c.daily_orders / countries.reduce((sum, x) => sum + x.daily_orders, 0) * 100).toFixed(1) : '0.0';

                return `
                    <tr>
                        <td class="country-name" onclick="highlightCountry('${c.country_key}')">${c.country_cn}</td>
                        <td>$${c.diesel_price.toFixed(2)}</td>
                        <td class="${changeClass}">${changeSign}${c.price_change_pct.toFixed(1)}%</td>
                        <td>$${c.cost_per_order.toFixed(4)}</td>
                        <td>${weight}%</td>
                    </tr>
                `;
            }).join('');
        }

        // 更新图表
        function updateChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            // 销毁旧图表
            if (priceChart) {
                priceChart.destroy();
            }

            // 存储原始数据供 tooltip 使用
            const rawPricesData = data;

            // 准备数据集 - 只显示涨幅
            const datasets = [];
            const countryKeys = Object.keys(data.countries);

            countryKeys.forEach((key, idx) => {
                const country = data.countries[key];
                const color = countryColors[key] || '#888888';

                // 涨幅线
                datasets.push({
                    label: country.country_cn,
                    data: country.changes,
                    borderColor: color,
                    backgroundColor: color + '20',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.3,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    // 存储原始价格数据
                    rawPrices: country.prices,
                    countryKey: key
                });
            });

            // 创建图表
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dates.length > 0 ? data.dates.map(d => formatDate(d)) : ['暂无历史数据'],
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: '#e0e0e0',
                                usePointStyle: true,
                                padding: 15
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#fff',
                            bodyColor: '#e0e0e0',
                            padding: 12,
                            callbacks: {
                                title: function(context) {
                                    const rawDate = rawPricesData.dates[context[0].dataIndex];
                                    return `Week of ${formatDate(rawDate)} (${rawDate})`;
                                },
                                label: function(context) {
                                    const val = context.parsed.y;
                                    const sign = val >= 0 ? '+' : '';
                                    const rawPrice = context.dataset.rawPrices?.[context.dataIndex] || 0;
                                    return `${context.dataset.label}: ${sign}${val.toFixed(1)}% ($${rawPrice.toFixed(2)}/L)`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Weekly Updates',
                                color: '#888'
                            },
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '涨幅 (%) - 相对 2026-02-23',
                                color: '#888'
                            },
                            ticks: {
                                color: '#888',
                                callback: function(value) {
                                    return (value >= 0 ? '+' : '') + value + '%';
                                }
                            },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${monthNames[parseInt(parts[1]) - 1]} ${parseInt(parts[2])}`;
        }

        // 高亮国家
        function highlightCountry(countryKey) {
            if (!priceChart) return;

            priceChart.data.datasets.forEach((dataset, i) => {
                const isTarget = dataset.label.includes(countryKey) ||
                                 dataset.label.includes(countryColors[countryKey]?.name_cn || '');
                dataset.borderWidth = isTarget ? 4 : 1;
                dataset.opacity = isTarget ? 1 : 0.3;
            });

            priceChart.update();
        }

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
